services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  server:
    build: .
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DB_PATH=/app/data/workflows.db
    depends_on:
      - redis
    command: npx tsx src/server.ts
    volumes:
      - db-data:/app/data

  worker:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DB_PATH=/app/data/workflows.db
    depends_on:
      - redis
    command: npx tsx src/worker.ts
    volumes:
      - db-data:/app/data

volumes:
  redis-data:
  db-data: